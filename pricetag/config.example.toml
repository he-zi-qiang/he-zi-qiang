[display]
width = 400
height = 300
title = "Claude Max"
footer = "powered by 何梓强"
serial = "42000E43"
# Drop a PNG here and the renderer pastes it top-left as the mascot.
# Leave empty to use the built-in red sparkle placeholder.
mascot_path = "assets/mascot.png"

[fonts]
# Default is macOS. Set Windows / Linux paths explicitly if needed:
#   Windows: cjk = "C:/Windows/Fonts/msyh.ttc", mono = "C:/Windows/Fonts/consola.ttf"
#   Linux:   cjk = "/usr/share/fonts/truetype/wqy/wqy-zenhei.ttc"
cjk = "/System/Library/Fonts/PingFang.ttc"
mono = "/System/Library/Fonts/Menlo.ttc"

[usage]
# How to get usage data:
#   "ccusage" - shell out to `npx ccusage statusline --json`
#   "mock"    - use example values for layout testing
source = "ccusage"

[ble]
# Fill in after flashing custom firmware; leave empty to disable BLE push.
# Find this in the WebFlasher UI (atc1441) or in NFC NDEF after pairing.
mac = ""
